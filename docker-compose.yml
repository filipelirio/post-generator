version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: gerador-artigos-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend/app:/app/app # Permite hot-reload local
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: gerador-artigos-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # Permite hot-reload local
      - /app/node_modules # Evita sobrescrever node_modules do container
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
